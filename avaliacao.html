    try {

      return v ? {
        value: v
      } : null;
    } catch {
      return null;
    }
  },

    try {

    } catch {
      return null;
    }

// ─── Scoring ──────────────────────────────────────────────────────────────────
const optIdx = (q, ans) => {
  if (ans === undefined || ans === null) return undefined;
  if (typeof ans === "number") return ans;
  const i = q.options?.indexOf(ans);
  return i >= 0 ? i : undefined;
};
function scoreVAS(answers) {
  return parseFloat(answers[0] ?? 0);
}
function scoreIKDC(answers, qs) {
  const vals = qs.map((q, i) => optIdx(q, answers[i]));
  if (vals.some(v => v === undefined)) return null;
  // Convert 0-based to 1-based, sum, normalize between min(10) and max(49)
  const oneBased = vals.map(v => v + 1);
  const sum = oneBased.reduce((a, b) => a + b, 0);
  const score = Math.round((sum - 10) / (49 - 10) * 100);
  return Math.max(0, Math.min(100, score));
}
function scoreQuickDASH(answers, qs) {
  const vals = qs.map((q, i) => optIdx(q, answers[i]));
  if (vals.some(v => v === undefined)) return null;
  const sum = vals.reduce((a, b) => a + b + 1, 0); // 1-5 scale
  return Math.max(0, Math.min(100, Math.round((sum / 11 - 1) / 4 * 100)));
}
function scoreKOOS_PS(answers, qs) {
  const vals = qs.map((q, i) => optIdx(q, answers[i]));
  if (vals.some(v => v === undefined)) return null;
  return Math.max(0, Math.min(100, Math.round(100 - vals.reduce((a, b) => a + b, 0) / (4 * qs.length) * 100)));
}
function scoreHOOS_PS(answers, qs) {
  const vals = qs.map((q, i) => optIdx(q, answers[i]));
  if (vals.some(v => v === undefined)) return null;
  return Math.max(0, Math.min(100, Math.round(100 - vals.reduce((a, b) => a + b, 0) / (4 * qs.length) * 100)));
}
function scoreFAOS(answers, qs, range) {
  const [s, e] = range;
  const vals = qs.slice(s, e + 1).map((q, i) => optIdx(q, answers[s + i]));
  if (vals.some(v => v === undefined)) return null;
  const n = e - s + 1;
  return Math.max(0, Math.min(100, Math.round(100 - vals.reduce((a, b) => a + b, 0) / (4 * n) * 100)));
}
function scoreOswestry(answers, qs) {
  const vals = qs.map((q, i) => optIdx(q, answers[i]));
  if (vals.some(v => v === undefined)) return null;
  return Math.max(0, Math.min(100, Math.round(vals.reduce((a, b) => a + b, 0) / (5 * qs.length) * 100)));
}
function scoreTampa(answers, qs) {
  const vals = qs.map((q, i) => optIdx(q, answers[i]));
  if (vals.some(v => v === undefined)) return null;
  // TSK-17: items 4,8,12,16 (1-indexed) = indices 3,7,11,15 (0-indexed) are reversed
  // Normal items: score = v+1 (1-4). Reversed: score = 4-v. Range: 17-68.
  const reversed = [3, 7, 11, 15];
  return vals.reduce((acc, v, i) => acc + (reversed.includes(i) ? 4 - v : v + 1), 0);
}
function scoreFESI(answers, qs) {
  const vals = qs.map((q, i) => optIdx(q, answers[i]));
  if (vals.some(v => v === undefined)) return null;
  return vals.reduce((a, b) => a + b + 1, 0);
}
function scoreHOS_AVD(answers, qs) {
  const vals = qs.map((q, i) => {
    const v = answers[i];
    if (v === "NA" || v === undefined) return null;
    return optIdx(q, v);
  });
  const valid = vals.filter(v => v !== null);
  if (valid.length === 0) return null;
  // HOS: 0 = no difficulty (best), 4 = unable (worst). Higher score = better function.
  return Math.max(0, Math.min(100, Math.round(100 - valid.reduce((a, b) => a + b, 0) / (4 * valid.length) * 100)));
}
function scoreNDI(answers, qs) {
  const vals = qs.map((q, i) => optIdx(q, answers[i]));
  if (vals.some(v => v === undefined)) return null;
  return Math.max(0, Math.min(100, Math.round(vals.reduce((a, b) => a + b, 0) / (5 * qs.length) * 100)));
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function buildQuestionSets(protocol) {
  if (!protocol) return [];
  if (protocol.sharedQs) {
    // FAOS: one big question bank, multiple sections scored differently
    const vasSection = protocol.sections[0];
    return [{
      label: "Dor (VAS)",
      qs: vasSection.qs,
      keys: ["VAS"]
    }, {
      label: "Tornozelo / Pé (FAOS — 21 itens)",
      qs: FAOS_Q,
      keys: ["FAOS_SINTOMAS", "FAOS_AVD", "FAOS_ESPORTE", "FAOS_QV"]
    }];
  }
  const seen = new Set();
  return protocol.sections.map(sec => {
    const qid = sec.qs[0]?.id?.split("_")[0] || sec.key;
    if (seen.has(qid)) return null;
    seen.add(qid);
    return {
      label: sec.label,
      qs: sec.qs,
      keys: [sec.key]
    };
  }).filter(Boolean);
}
function computeAllScores(protocol, answers) {
  return protocol.sections.map(sec => {
    const arr = sec.qs.map(q => answers[q.id]);
    const score = sec.scoreFn(arr, sec.qs);
    return {
      key: sec.key,
      label: sec.label,
      score,
      unit: sec.unit
    };
  });
